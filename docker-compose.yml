# ========================================
# GLB 模型查看器 - Docker Compose 部署
# ========================================
# 使用方法（极空间 / 群晖 / 通用）:
#   1. 编辑下方 models 挂载路径，改成你放 .glb 模型的目录
#   2. docker compose up -d
#   3. 浏览器访问 http://你的NAS_IP:8080
#
# 方式一（推荐）: 直接拉取远程镜像，无需本地构建
# 方式二: 若无法访问 GHCR，取消下方 build 注释，运行 docker compose up -d --build
# ========================================

services:
  glb-viewer:
    image: ghcr.io/winter-tech/glb-viewer:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: glb-viewer
    restart: unless-stopped
    ports:
      - "8080:3000"
    volumes:
      # 🔧 改成你放 .glb / .gltf 模型文件的实际目录
      # 极空间示例: /zspace/共享文件夹/3D模型:/app/models:ro
      # 群晖示例:   /volume1/models:/app/models:ro
      # 通用示例:   ./models:/app/models:ro
      - ./models:/app/models:ro
    environment:
      - PORT=3000
      - MODELS_DIR=/app/models
      - CACHE_TTL=30
