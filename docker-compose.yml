# ========================================
# GLB 模型查看器 - Docker Compose 部署
# ========================================
# 使用方法:
#   1. 将 .glb / .gltf 模型文件放入 ./models/ 目录
#   2. docker compose up -d
#   3. 浏览器访问 http://localhost:8080
# ========================================

services:
  glb-viewer:
    build: .
    # 如果需要直接使用预构建镜像，取消下面注释并注释掉 build
    # image: your-registry/glb-viewer:latest
    container_name: glb-viewer
    restart: unless-stopped
    ports:
      - "8080:3000"
    volumes:
      # 将本地的 models/ 目录挂载到容器内
      - ./models:/app/models:ro
    environment:
      # 服务端口（容器内部）
      - PORT=3000
      # 模型目录（容器内部路径，一般不需要改）
      - MODELS_DIR=/app/models
      # 模型列表缓存时间（秒），设为 0 表示每次请求都扫描
      - CACHE_TTL=30
    # 资源限制（可选）
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
